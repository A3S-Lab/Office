name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check library
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Type-check playground
        run: bun run playground:typecheck

      - name: Build playground
        run: bun run playground:build

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check native workspace
        run: cargo check --workspace --all-targets

      - name: Test native workspace
        run: cargo test --workspace

      - name: Inspect npm package
        run: bun pm pack --dry-run
